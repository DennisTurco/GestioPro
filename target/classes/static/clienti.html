<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clienti — Gestionale</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">📊</div>
            Gestionale
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-label">Menu principale</div>
            <div class="nav-item" data-page="dashboard"><span class="nav-icon">🏠</span> Dashboard</div>
            <div class="nav-item" data-page="clienti"><span class="nav-icon">👥</span> Clienti</div>
            <div class="nav-item" data-page="fatture"><span class="nav-icon">📄</span> Fatture</div>
            <div class="nav-item" data-page="task"><span class="nav-icon">✅</span> Task</div>
            <div class="sidebar-section-label">Sistema</div>
            <div class="nav-item" data-page="impostazioni"><span class="nav-icon">⚙️</span> Impostazioni</div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div>
                    <div class="font-medium" style="color:#E2E8F0;font-size:13px">Utente</div>
                    <div style="font-size:11px">Freelance</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-content">

        <header class="topbar">
            <div class="topbar-title">Clienti</div>
            <div class="topbar-actions">
                <span class="text-muted text-sm" id="count-clienti"></span>
                <button class="btn btn-primary btn-sm" data-modal-open="modal-cliente">
                    ➕ Nuovo cliente
                </button>
            </div>
        </header>

        <main class="page-body">

            <div class="card">
                <!-- Toolbar ricerca + filtri -->
                <div class="toolbar">
                    <div class="search-bar" style="width:260px">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-control" id="search-input" placeholder="Cerca cliente…">
                    </div>
                    <div class="toolbar-right">
                        <button class="btn btn-ghost btn-sm" onclick="exportClienti()">📥 Esporta CSV</button>
                    </div>
                </div>

                <!-- Tabella -->
                <div class="table-wrapper" style="border:none;border-radius:0">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Cliente</th>
                                <th>Email</th>
                                <th>Telefono</th>
                                <th>Città</th>
                                <th>Fatture</th>
                                <th style="width:100px">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="clienti-tbody">
                            <tr><td colspan="7" class="text-center text-muted" style="padding:32px">
                                <div class="spinner"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer text-muted text-sm" id="table-footer">
                    Caricamento…
                </div>
            </div>

        </main>
    </div>
</div>

<!-- MODAL: Nuovo / Modifica Cliente -->
<div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <div class="modal-header">
            <span id="modal-cliente-title">👤 Nuovo cliente</span>
            <button class="btn-close" data-modal-close="modal-cliente">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="cliente-id">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nome *</label>
                    <input type="text" class="form-control" id="cliente-nome" placeholder="Mario Rossi">
                </div>
                <div class="form-group">
                    <label class="form-label">Azienda</label>
                    <input type="text" class="form-control" id="cliente-azienda" placeholder="Rossi SRL">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="cliente-email" placeholder="mario@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Telefono</label>
                    <input type="tel" class="form-control" id="cliente-telefono" placeholder="+39 333 000 0000">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Città</label>
                    <input type="text" class="form-control" id="cliente-citta" placeholder="Milano">
                </div>
                <div class="form-group">
                    <label class="form-label">P. IVA</label>
                    <input type="text" class="form-control" id="cliente-piva" placeholder="IT01234567890">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Note</label>
                <textarea class="form-control" id="cliente-note" rows="3" placeholder="Note aggiuntive…" style="resize:vertical"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" data-modal-close="modal-cliente">Annulla</button>
            <button class="btn btn-primary" onclick="salvaCliente()">💾 Salva</button>
        </div>
    </div>
</div>

<!-- MODAL: Conferma eliminazione -->
<div class="modal-overlay" id="modal-elimina">
    <div class="modal">
        <div class="modal-header">
            ⚠️ Conferma eliminazione
            <button class="btn-close" data-modal-close="modal-elimina">✕</button>
        </div>
        <div class="modal-body">
            <p>Sei sicuro di voler eliminare <strong id="elimina-nome"></strong>?</p>
            <p class="text-muted text-sm mt-8">Questa azione non può essere annullata.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" data-modal-close="modal-elimina">Annulla</button>
            <button class="btn btn-danger" onclick="confermaElimina()">🗑️ Elimina</button>
        </div>
    </div>
</div>

<div class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let tuttiClienti = [];
let clienteDaEliminare = null;

document.addEventListener('DOMContentLoaded', async () => {
    await loadClienti();

    document.getElementById('search-input').addEventListener('input', (e) => {
        renderTabella(filterItems(tuttiClienti, e.target.value, ['nome', 'email', 'citta', 'azienda']));
    });

    // Reset form quando si apre il modal per nuovo cliente
    document.querySelector('[data-modal-open="modal-cliente"]').addEventListener('click', () => {
        resetForm();
    });
});

async function loadClienti() {
    try {
        tuttiClienti = await ClientiAPI.getAll();
        renderTabella(tuttiClienti);
    } catch (e) {
        const tbody = document.getElementById('clienti-tbody');
        setHTML(tbody, `<tr><td colspan="7" class="text-center text-muted" style="padding:32px">
            ❌ Errore nel caricamento dei clienti.<br>
            <span class="text-sm">Verificare che il server Spring Boot sia avviato.</span>
        </td></tr>`);
    }
}

function renderTabella(clienti) {
    const tbody = document.getElementById('clienti-tbody');
    const footer = document.getElementById('table-footer');
    const count = document.getElementById('count-clienti');

    if (count) count.textContent = `${clienti.length} clienti`;
    if (footer) footer.textContent = `${clienti.length} risultati`;

    if (!clienti.length) {
        showEmptyState(tbody.parentElement.parentElement, 'Nessun cliente trovato', '➕ Aggiungi il primo', "openModal('modal-cliente');resetForm()");
        tbody.innerHTML = '';
        return;
    }

    setHTML(tbody, clienti.map(c => `
        <tr>
            <td class="text-muted text-sm">${c.id}</td>
            <td>
                <div style="display:flex;align-items:center;gap:10px">
                    <div class="avatar" style="flex-shrink:0">${getInitials(c.nome)}</div>
                    <div>
                        <div class="font-medium">${c.nome ?? '—'}</div>
                        <div class="text-xs text-muted">${c.azienda ?? ''}</div>
                    </div>
                </div>
            </td>
            <td>${c.email ?? '—'}</td>
            <td>${c.telefono ?? '—'}</td>
            <td>${c.citta ?? '—'}</td>
            <td><span class="badge badge-info">0 fatture</span></td>
            <td>
                <div style="display:flex;gap:6px">
                    <button class="btn btn-ghost btn-sm btn-icon" title="Modifica" onclick="modificaCliente(${c.id})">✏️</button>
                    <button class="btn btn-ghost btn-sm btn-icon" title="Elimina" onclick="chiediElimina(${c.id}, '${(c.nome ?? '').replace(/'/g, "\\'")}')">🗑️</button>
                </div>
            </td>
        </tr>`).join(''));
}

function resetForm() {
    document.getElementById('cliente-id').value = '';
    document.getElementById('modal-cliente-title').textContent = '👤 Nuovo cliente';
    ['nome','azienda','email','telefono','citta','piva','note'].forEach(f => {
        const el = document.getElementById(`cliente-${f}`);
        if (el) el.value = '';
    });
}

function modificaCliente(id) {
    const c = tuttiClienti.find(x => x.id === id);
    if (!c) return;
    document.getElementById('cliente-id').value = c.id;
    document.getElementById('modal-cliente-title').textContent = '✏️ Modifica cliente';
    document.getElementById('cliente-nome').value = c.nome ?? '';
    document.getElementById('cliente-azienda').value = c.azienda ?? '';
    document.getElementById('cliente-email').value = c.email ?? '';
    document.getElementById('cliente-telefono').value = c.telefono ?? '';
    document.getElementById('cliente-citta').value = c.citta ?? '';
    document.getElementById('cliente-piva').value = c.piva ?? '';
    document.getElementById('cliente-note').value = c.note ?? '';
    openModal('modal-cliente');
}

async function salvaCliente() {
    const nome = document.getElementById('cliente-nome').value.trim();
    if (!nome) { showToast('Il nome è obbligatorio', 'warning'); return; }

    const data = {
        nome,
        azienda:   document.getElementById('cliente-azienda').value.trim() || null,
        email:     document.getElementById('cliente-email').value.trim() || null,
        telefono:  document.getElementById('cliente-telefono').value.trim() || null,
        citta:     document.getElementById('cliente-citta').value.trim() || null,
        piva:      document.getElementById('cliente-piva').value.trim() || null,
        note:      document.getElementById('cliente-note').value.trim() || null,
    };

    const id = document.getElementById('cliente-id').value;
    try {
        if (id) {
            await ClientiAPI.update(id, data);
            showToast('Cliente aggiornato', 'success');
        } else {
            await ClientiAPI.create(data);
            showToast('Cliente aggiunto', 'success');
        }
        closeModal('modal-cliente');
        await loadClienti();
    } catch (e) {
        showToast(`Errore: ${e.message}`, 'error');
    }
}

function chiediElimina(id, nome) {
    clienteDaEliminare = id;
    document.getElementById('elimina-nome').textContent = nome;
    openModal('modal-elimina');
}

async function confermaElimina() {
    if (!clienteDaEliminare) return;
    try {
        await ClientiAPI.delete(clienteDaEliminare);
        showToast('Cliente eliminato', 'success');
        closeModal('modal-elimina');
        await loadClienti();
    } catch (e) {
        showToast(`Errore: ${e.message}`, 'error');
    }
    clienteDaEliminare = null;
}

function exportClienti() {
    if (!tuttiClienti.length) { showToast('Nessun dato da esportare', 'warning'); return; }
    const header = ['ID','Nome','Azienda','Email','Telefono','Città','P.IVA'].join(',');
    const rows = tuttiClienti.map(c =>
        [c.id, c.nome, c.azienda, c.email, c.telefono, c.citta, c.piva]
        .map(v => `"${v ?? ''}"`).join(','));
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `clienti_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('CSV esportato', 'success');
}
</script>
</body>
</html>
