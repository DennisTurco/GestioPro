<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestioPro - Accesso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body style="overflow:auto">

<div class="login-shell">

    <!-- Brand Panel -->
    <div class="login-brand">
        <div class="brand-logo"><i class="fa-solid fa-briefcase"></i></div>
        <h1 id="login-app-name">GestioPro</h1>
        <p id="login-brand-subtitle">Gestionale<br><strong>per uso personale</strong></p>
        <div style="margin-top:32px;padding:16px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:12px;line-height:1.7;opacity:0.85">
            <i class="fa-solid fa-circle-info"></i>&nbsp; Applicazione ad uso personale.<br>
            Non destinata alla vendita.
        </div>
    </div>

    <!-- Login/Register Panel -->
    <div class="login-right">
        <div class="login-box">

            <!-- Login Form -->
            <div id="form-login">
                 <h2>Accedi</h2>
                <p class="subtitle">Inserisci le tue credenziali</p>
            <form method="post" action="/login">
                <div class="form-group">
                    <label>Nome utente</label>
                    <input type="text"
                        name="username"
                        class="form-control"
                        required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password"
                        name="password"
                        class="form-control"
                        required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">
                    <i class="fa-solid fa-user"></i> Accedi
                </button>
                <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--color-text-muted)">
                    Prima volta? <a href="#" onclick="toggleForm()" style="color:var(--color-primary);font-weight:600">Crea account</a>
                </p>
            </form>
            </div>

            <!-- Register Form -->
            <div id="form-register" style="display:none">
                <h2>Crea account</h2>
                <p class="subtitle">Registra le tue credenziali</p>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nome *</label>
                        <input type="text" id="reg-name" class="form-control" required placeholder="Mario">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cognome *</label>
                        <input type="text" id="reg-surname" class="form-control" required placeholder="Rossi">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Nome utente *</label>
                    <input type="text" id="reg-username" class="form-control" required placeholder="mario.rossi">
                </div>
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" id="reg-email" class="form-control" required placeholder="mario@gmail.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" id="reg-pass" class="form-control" required placeholder="••••••••">
                </div>
                <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="doRegister()">
                    <i class="fa-solid fa-user-plus"></i> Registrati
                </button>
                <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--color-text-muted)">
                    Hai già un account? <a href="#" onclick="toggleForm()" style="color:var(--color-primary);font-weight:600">Accedi</a>
                </p>
            </div>

            <div id="login-error" style="display:none;margin-top:12px" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation"></i> <span id="login-error-msg">Credenziali non valide</span>
            </div>

        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>

    function toggleForm() {
        const login = document.getElementById('form-login');
        const register = document.getElementById('form-register');

        const isLoginVisible = login.style.display !== 'none';

        login.style.display = isLoginVisible ? 'none' : '';
        register.style.display = isLoginVisible ? '' : 'none';

        document.getElementById('login-error').style.display = 'none';
    }

    function showError(msg) {
        const el = document.getElementById('login-error');
        document.getElementById('login-error-msg').textContent = msg;
        el.style.display = 'flex';
    }

    function doRegister() {
        const name = document.getElementById('reg-name').value.trim();
        if (!name) { showToast('Il nome è obbligatorio', 'warning'); return; }

        const surname = document.getElementById('reg-surname').value.trim();
        if (!surname) { showToast('Il cognome è obbligatorio', 'warning'); return; }

        const email = document.getElementById('reg-email').value.trim();
        if (!email) { showToast(`L'email è obbligatoria`, 'warning'); return; }

        const username = document.getElementById('reg-username').value.trim();
        if (!username) { showToast('Il nome utente è obbligatorio', 'warning'); return; }

        const password = document.getElementById('reg-pass').value.trim();
        if (!password) { showToast('La password è obbligatoria', 'warning'); return; }

        const data = {
            name,
            surname,
            email,
            password,
            username
        };

        console.log(data);

        try {
            const res = UserAPI.register(data);
            showToast('Utenza creata con successo!', 'success');
            toggleForm();
        } catch (e) {
            showToast(`Errore: ${e.message}`);
            console.log(`Errore: ${e.message}`, 'error');
        }
    }
</script>
</body>
</html>
