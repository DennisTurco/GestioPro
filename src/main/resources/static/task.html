<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task — Gestionale</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">📊</div>
            Gestionale
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-label">Menu principale</div>
            <div class="nav-item" data-page="dashboard"><span class="nav-icon">🏠</span> Dashboard</div>
            <div class="nav-item" data-page="clienti"><span class="nav-icon">👥</span> Clienti</div>
            <div class="nav-item" data-page="fatture"><span class="nav-icon">📄</span> Fatture</div>
            <div class="nav-item" data-page="task"><span class="nav-icon">✅</span> Task</div>
            <div class="sidebar-section-label">Sistema</div>
            <div class="nav-item" data-page="impostazioni"><span class="nav-icon">⚙️</span> Impostazioni</div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div>
                    <div class="font-medium" style="color:#E2E8F0;font-size:13px">Utente</div>
                    <div style="font-size:11px">Freelance</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-content">

        <header class="topbar">
            <div class="topbar-title">Task e Appuntamenti</div>
            <div class="topbar-actions">
                <button class="btn btn-primary btn-sm" data-modal-open="modal-task">
                    ➕ Nuovo task
                </button>
            </div>
        </header>

        <main class="page-body">

            <!-- Filtri rapidi a tab -->
            <div class="flex gap-8 mb-16" id="filtri-tab">
                <button class="btn btn-primary btn-sm" onclick="setFiltroTab('tutti', this)">Tutti</button>
                <button class="btn btn-ghost btn-sm" onclick="setFiltroTab('da_fare', this)">Da fare</button>
                <button class="btn btn-ghost btn-sm" onclick="setFiltroTab('in_corso', this)">In corso</button>
                <button class="btn btn-ghost btn-sm" onclick="setFiltroTab('completato', this)">Completati</button>
                <div style="margin-left:auto">
                    <div class="search-bar" style="width:220px">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-control" id="search-input" placeholder="Cerca task…">
                    </div>
                </div>
            </div>

            <!-- Lista task -->
            <div id="task-list"></div>

        </main>
    </div>
</div>

<!-- MODAL: Nuovo / Modifica Task -->
<div class="modal-overlay" id="modal-task">
    <div class="modal">
        <div class="modal-header">
            <span id="modal-task-title">✅ Nuovo task</span>
            <button class="btn-close" data-modal-close="modal-task">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="task-id">
            <div class="form-group">
                <label class="form-label">Titolo *</label>
                <input type="text" class="form-control" id="task-titolo" placeholder="Descrivi brevemente il task…">
            </div>
            <div class="form-group">
                <label class="form-label">Descrizione</label>
                <textarea class="form-control" id="task-descrizione" rows="3" placeholder="Dettagli, link, note utili…" style="resize:vertical"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Priorità</label>
                    <select class="form-control" id="task-priorita">
                        <option value="alta">🔴 Alta</option>
                        <option value="media" selected>🟡 Media</option>
                        <option value="bassa">🟢 Bassa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Stato</label>
                    <select class="form-control" id="task-stato">
                        <option value="da_fare">📋 Da fare</option>
                        <option value="in_corso">▶️ In corso</option>
                        <option value="completato">✅ Completato</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Cliente collegato</label>
                    <select class="form-control" id="task-cliente">
                        <option value="">— Nessuno —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Scadenza</label>
                    <input type="date" class="form-control" id="task-scadenza">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" data-modal-close="modal-task">Annulla</button>
            <button class="btn btn-primary" onclick="salvaTask()">💾 Salva</button>
        </div>
    </div>
</div>

<div class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let tuttiTask = [];
let filtroCorrente = 'tutti';

const STATI_TASK = {
    da_fare:    { label: 'Da fare',    cls: 'badge-muted',   icon: '📋' },
    in_corso:   { label: 'In corso',   cls: 'badge-info',    icon: '▶️' },
    completato: { label: 'Completato', cls: 'badge-success', icon: '✅' },
};

const PRIORITA = {
    alta:  { label: 'Alta',  cls: 'alta',  dot: '🔴' },
    media: { label: 'Media', cls: 'media', dot: '🟡' },
    bassa: { label: 'Bassa', cls: 'bassa', dot: '🟢' },
};

document.addEventListener('DOMContentLoaded', async () => {
    await Promise.allSettled([loadTask(), populateClientiSelect()]);
    document.getElementById('search-input').addEventListener('input', applyFilters);
});

async function loadTask() {
    try {
        tuttiTask = await TaskAPI.getAll();
    } catch (e) {
        tuttiTask = [];
    }
    renderTask(tuttiTask);
}

async function populateClientiSelect() {
    try {
        const clienti = await ClientiAPI.getAll();
        const sel = document.getElementById('task-cliente');
        clienti.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.nome;
            sel.appendChild(opt);
        });
    } catch (e) { /* silenzioso */ }
}

function setFiltroTab(stato, btnEl) {
    filtroCorrente = stato;
    document.querySelectorAll('#filtri-tab .btn').forEach(b => {
        b.className = 'btn btn-ghost btn-sm';
    });
    if (btnEl) btnEl.className = 'btn btn-primary btn-sm';
    applyFilters();
}

function applyFilters() {
    const q = document.getElementById('search-input').value;
    let risultati = filterItems(tuttiTask, q, ['titolo', 'descrizione', 'clienteNome']);
    if (filtroCorrente !== 'tutti') risultati = risultati.filter(t => t.stato === filtroCorrente);
    renderTask(risultati);
}

function renderTask(tasks) {
    const container = document.getElementById('task-list');
    if (!tasks.length) {
        showEmptyState(container, 'Nessun task trovato', '➕ Crea task', "openModal('modal-task');resetTaskForm()");
        return;
    }

    // Group tasks by priority
    const gruppi = [
        { key: 'alta',  items: tasks.filter(t => t.priorita === 'alta')  },
        { key: 'media', items: tasks.filter(t => t.priorita === 'media') },
        { key: 'bassa', items: tasks.filter(t => !t.priorita || t.priorita === 'bassa') },
    ].filter(g => g.items.length);

    setHTML(container, gruppi.map(g => {
        const p = PRIORITA[g.key] ?? PRIORITA.bassa;
        return `
        <div class="card mb-16">
            <div class="card-header">
                <span><span class="priority-dot ${p.cls}"></span>${p.label} priorità</span>
                <span class="badge badge-muted">${g.items.length}</span>
            </div>
            <ul style="padding:0">
                ${g.items.map(t => renderTaskItem(t)).join('')}
            </ul>
        </div>`;
    }).join(''));
}

function renderTaskItem(t) {
    const s = STATI_TASK[t.stato] ?? STATI_TASK.da_fare;
    const scadenzaHtml = t.scadenza
        ? `<span class="text-xs text-muted">📅 ${formatDate(t.scadenza)}</span>`
        : '';
    const clienteHtml = t.clienteNome
        ? `<span class="text-xs text-muted">👤 ${t.clienteNome}</span>`
        : '';
    const completato = t.stato === 'completato';

    return `
    <li style="display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--color-border)">
        <input type="checkbox" ${completato ? 'checked' : ''}
            onchange="toggleCompletato(${t.id}, this.checked)"
            style="width:18px;height:18px;cursor:pointer;accent-color:var(--color-primary)">
        <div style="flex:1;min-width:0">
            <div class="font-medium" style="${completato ? 'text-decoration:line-through;color:var(--color-text-muted)' : ''}">
                ${t.titolo ?? '—'}
            </div>
            ${t.descrizione ? `<div class="text-sm text-muted" style="margin-top:2px">${t.descrizione}</div>` : ''}
            <div class="flex gap-8 mt-8">
                ${scadenzaHtml}
                ${clienteHtml}
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span class="badge ${s.cls}">${s.icon} ${s.label}</span>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="modificaTask(${t.id})">✏️</button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="eliminaTask(${t.id})">🗑️</button>
        </div>
    </li>`;
}

async function toggleCompletato(id, checked) {
    try {
        await TaskAPI.update(id, { stato: checked ? 'completato' : 'da_fare' });
        await loadTask();
    } catch (e) { showToast(`Errore: ${e.message}`, 'error'); }
}

function resetTaskForm() {
    document.getElementById('task-id').value = '';
    document.getElementById('modal-task-title').textContent = '✅ Nuovo task';
    ['titolo','descrizione'].forEach(f => document.getElementById(`task-${f}`).value = '');
    document.getElementById('task-priorita').value = 'media';
    document.getElementById('task-stato').value = 'da_fare';
    document.getElementById('task-cliente').value = '';
    document.getElementById('task-scadenza').value = '';
}

function modificaTask(id) {
    const t = tuttiTask.find(x => x.id === id);
    if (!t) return;
    document.getElementById('task-id').value = t.id;
    document.getElementById('modal-task-title').textContent = '✏️ Modifica task';
    document.getElementById('task-titolo').value      = t.titolo ?? '';
    document.getElementById('task-descrizione').value = t.descrizione ?? '';
    document.getElementById('task-priorita').value    = t.priorita ?? 'media';
    document.getElementById('task-stato').value       = t.stato ?? 'da_fare';
    document.getElementById('task-cliente').value     = t.clienteId ?? '';
    document.getElementById('task-scadenza').value    = t.scadenza?.slice(0,10) ?? '';
    openModal('modal-task');
}

async function salvaTask() {
    const titolo = document.getElementById('task-titolo').value.trim();
    if (!titolo) { showToast('Il titolo è obbligatorio', 'warning'); return; }

    const data = {
        titolo,
        descrizione: document.getElementById('task-descrizione').value.trim() || null,
        priorita:    document.getElementById('task-priorita').value,
        stato:       document.getElementById('task-stato').value,
        clienteId:   document.getElementById('task-cliente').value || null,
        scadenza:    document.getElementById('task-scadenza').value || null,
    };

    const id = document.getElementById('task-id').value;
    try {
        if (id) { await TaskAPI.update(id, data); showToast('Task aggiornato', 'success'); }
        else     { await TaskAPI.create(data);    showToast('Task creato', 'success'); }
        closeModal('modal-task');
        await loadTask();
    } catch (e) { showToast(`Errore: ${e.message}`, 'error'); }
}

async function eliminaTask(id) {
    if (!confirm('Eliminare questo task?')) return;
    try {
        await TaskAPI.delete(id);
        showToast('Task eliminato', 'success');
        await loadTask();
    } catch (e) { showToast(`Errore: ${e.message}`, 'error'); }
}
</script>
</body>
</html>
