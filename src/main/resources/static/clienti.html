<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clienti - Gestionale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fa-solid fa-manat-sign"></i></div>
            Gestionale
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-label">Menu principale</div>
            <div class="nav-item" data-page="dashboard"><span class="nav-icon"><i class="fa-solid fa-chart-pie"></i></span> Dashboard</div>
            <div class="nav-item" data-page="clienti"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Clienti</div>
            <div class="nav-item" data-page="fatture"><span class="nav-icon"><i class="fa-solid fa-receipt"></i></span> Fatture</div>
            <div class="nav-item" data-page="task"><span class="nav-icon"><i class="fa-solid fa-calendar-check"></i></span> Task</div>
            <div class="sidebar-section-label">Sistema</div>
            <div class="nav-item" data-page="impostazioni"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span> Impostazioni</div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"></div>
                <div>
                    <div class="font-medium" style="color:#E2E8F0;font-size:13px">Utente</div>
                    <div style="font-size:11px">Freelance</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-content">

        <header class="topbar">
            <div class="topbar-title">Clienti</div>
            <div class="topbar-actions">
                <span class="text-muted text-sm" id="count-clienti"></span>
                <button class="btn btn-primary btn-sm" data-modal-open="modal-cliente">
                    <i class="fa-solid fa-circle-plus"></i> Nuovo cliente
                </button>
            </div>
        </header>

        <main class="page-body">

            <div class="card">
                <!-- Toolbar ricerca + filtri -->
                <div class="toolbar">
                    <div class="search-bar" style="width:260px">
                        <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" class="form-control" id="search-input" placeholder="Cerca cliente…">
                    </div>
                    <div class="toolbar-right">
                        <button class="btn btn-ghost btn-sm" onclick="exportClienti()"><i class="fa-solid fa-download"></i> Esporta CSV</button>
                    </div>
                </div>

                <!-- Tabella -->
                <div class="table-wrapper" style="border:none;border-radius:0">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Email</th>
                                <th>Telefono</th>
                                <th>Città</th>
                                <th>Fatture</th>
                                <th style="width:100px">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="clienti-tbody">
                            <tr><td colspan="7" class="text-center text-muted" style="padding:32px">
                                <div class="spinner"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer text-muted text-sm" id="table-footer">
                    Caricamento…
                </div>
            </div>

        </main>
    </div>
</div>

<!-- MODAL: Nuovo / Modifica Cliente -->
<div class="modal-overlay" id="modal-cliente">
    <div class="modal">
        <div class="modal-header">
            <span id="modal-customer-title">
                <i class="fa-solid fa-users"></i> Nuovo cliente
            </span>
            <button class="btn-close" data-modal-close="modal-cliente">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="customer-id">
            <!-- CUSTOMER TYPE -->
            <div class="form-group">
                <label class="form-label">Tipo cliente *</label>
                <select class="form-control" id="customer-type" required>
                    <!-- get from backend -->
                </select>
            </div>
            <!-- NAME -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nome *</label>
                    <input type="text" class="form-control"
                           id="customer-name"
                           placeholder="Mario"
                           required>
                </div>
                <div class="form-group">
                    <label class="form-label">Cognome *</label>
                    <input type="text" class="form-control"
                           id="customer-surname"
                           placeholder="Rossi"
                           required>
                </div>
            </div>
            <!-- CONTACT -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control"
                           id="customer-email"
                           placeholder="mario@email.com"
                           required>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefono *</label>
                    <input type="tel" class="form-control"
                           id="customer-phone"
                           placeholder="+39 333 000 0000"
                           required>
                </div>
            </div>
            <!-- COMPANY -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Ragione Sociale</label>
                    <input type="text" class="form-control"
                           id="customer-companyName"
                           placeholder="Rossi SRL">
                </div>
                <div class="form-group">
                    <label class="form-label">Partita IVA</label>
                    <input type="text" class="form-control"
                           id="customer-vatNumber"
                           placeholder="IT01234567890">
                </div>
                <div class="form-group">
                    <label class="form-label">Codice Fiscale</label>
                    <input type="text" class="form-control"
                           id="customer-taxCode">
                </div>
            </div>
            <!-- ADDRESS -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nazione</label>
                    <input type="text" class="form-control" id="customer-country">
                </div>
                <div class="form-group">
                    <label class="form-label">Regione</label>
                    <input type="text" class="form-control" id="customer-region">
                </div>
                <div class="form-group">
                    <label class="form-label">Provincia</label>
                    <input type="text" class="form-control" id="customer-province">
                </div>
                <div class="form-group">
                    <label class="form-label">Città</label>
                    <input type="text" class="form-control" id="customer-city">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Indirizzo</label>
                <input type="text" class="form-control" id="customer-address">
            </div>
            <!-- GEO -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Latitudine</label>
                    <input type="number" step="any"
                           class="form-control"
                           id="customer-lat">
                </div>
                <div class="form-group">
                    <label class="form-label">Longitudine</label>
                    <input type="number" step="any"
                           class="form-control"
                           id="customer-lon">
                </div>
            </div>
            <!-- LANDLINE -->
            <div class="form-group">
                <label class="form-label">Telefono fisso</label>
                <input type="tel" class="form-control" id="customer-landline">
            </div>
            <!-- NOTES -->
            <div class="form-group">
                <label class="form-label">Note</label>
                <textarea class="form-control"
                          id="customer-notes"
                          rows="3"
                          style="resize:vertical"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" data-modal-close="modal-cliente">
                Annulla
            </button>
            <button class="btn btn-primary" onclick="saveCustomer()">
                <i class="fa-solid fa-floppy-disk"></i> Salva
            </button>
        </div>
    </div>
</div>

<!-- MODAL: Conferma eliminazione -->
<div class="modal-overlay" id="modal-elimina">
    <div class="modal">
        <div class="modal-header">
            <i class="fa-solid fa-triangle-exclamation"></i> Conferma eliminazione
            <button class="btn-close" data-modal-close="modal-elimina">✕</button>
        </div>
        <div class="modal-body">
            <p>Sei sicuro di voler eliminare <strong id="elimina-name"></strong>?</p>
            <p class="text-muted text-sm mt-8">Questa azione non può essere annullata.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" data-modal-close="modal-elimina">Annulla</button>
            <button class="btn btn-danger" onclick="confermaElimina()"><i class="fa-solid fa-trash"></i> Elimina</button>
        </div>
    </div>
</div>

<div class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let tuttiClienti = [];
let clienteDaEliminare = null;

// called at page load
document.addEventListener('DOMContentLoaded', async () => {
    await loadClienti();
    await loadCustomeTypes();

    document.getElementById('search-input').addEventListener('input', (e) => {
        renderTabella(filterItems(tuttiClienti, e.target.value, ['nome', 'email', 'citta', 'azienda']));
    });

    // Reset form when opening the modal for a new client
    document.querySelector('[data-modal-open="modal-cliente"]').addEventListener('click', () => {
        resetForm();
        updateCustomerFields();
    });

    document
        .getElementById('customer-type')
        .addEventListener('change', updateCustomerFields);
});

async function loadClienti() {
    try {
        tuttiClienti = await ClientiAPI.getAll();
        renderTabella(tuttiClienti);
    } catch (e) {
        const tbody = document.getElementById('clienti-tbody');
        setHTML(tbody, `<tr><td colspan="7" class="text-center text-muted" style="padding:32px">
            <i class="fa-solid fa-x"></i> Errore nel caricamento dei clienti.<br>
            <span class="text-sm">Verificare che il server Spring Boot sia avviato.</span>
        </td></tr>`);
    }
}

function renderTabella(clienti) {
    const tbody = document.getElementById('clienti-tbody');
    const footer = document.getElementById('table-footer');
    const count = document.getElementById('count-clienti');

    if (count) count.textContent = `${clienti.length} clienti`;
    if (footer) footer.textContent = `${clienti.length} risultati`;

    if (!clienti.length) {
        showEmptyState(tbody.parentElement.parentElement, 'Nessun cliente trovato', '<i class="fa-solid fa-circle-plus"></i> Aggiungi il primo', "openModal('modal-cliente');resetForm()");
        tbody.innerHTML = '';
        return;
    }

    setHTML(tbody, clienti.map(c => `
        <tr>
            <td class="text-muted text-sm">${c.id}</td>
            <td>
                <div style="display:flex;align-items:center;gap:10px">
                    <div class="avatar" style="flex-shrink:0">${getInitials(c.name)}</div>
                    <div>
                        <div class="font-medium">${c.name + " " + c.surname}</div>
                        <div class="text-xs text-muted">${c.companyName ?? ''}</div>
                    </div>
                </div>
            </td>
            <td>${c.email}</td>
            <td>${c.phone}</td>
            <td>${c.city ?? '-'}</td>
            <td><span class="badge badge-info">0 fatture</span></td>
            <td>
                <div style="display:flex;gap:6px">
                    <button class="btn btn-ghost btn-sm btn-icon" title="Modifica" onclick="modificaCliente(${c.id})"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-ghost btn-sm btn-icon" title="Elimina" onclick="chiediElimina(${c.id}, '${(c.name ?? '').replace(/'/g, "\\'")}')">🗑️</button>
                </div>
            </td>
        </tr>`).join(''));
}

function resetForm() {
    document.getElementById('customer-id').value = '';
    document
        .querySelectorAll('#modal-cliente input, #modal-cliente textarea')
        .forEach(el => el.value = '');

}

function modificaCliente(id) {
    const c = tuttiClienti.find(x => x.id === id);
    if (!c) return;
    document.getElementById('customer-id').value = c.id;
    document.getElementById('customer-type').value = c.customerType.id;
    document.getElementById('modal-customer-title').textContent = '<i class="fa-solid fa-pen"></i> Modifica cliente';
    document.getElementById('customer-name').value = c.name ?? '';
    document.getElementById('customer-surname').value = c.surname ?? '';
    document.getElementById('customer-email').value = c.email ?? '';
    document.getElementById('customer-phone').value = c.phone ?? '';
    document.getElementById('customer-companyName').value = c.companyName ?? '';
    document.getElementById('customer-country').value = c.country ?? '';
    document.getElementById('customer-region').value = c.region ?? '';
    document.getElementById('customer-province').value = c.province ?? '';
    document.getElementById('customer-address').value = c.address ?? '';
    document.getElementById('customer-city').value = c.city ?? '';
    document.getElementById('customer-lat').value = c.lat ?? '';
    document.getElementById('customer-lon').value = c.lon ?? '';
    document.getElementById('customer-vatNumber').value = c.vatNumber ?? '';
    document.getElementById('customer-taxCode').value = c.taxCode ?? '';
    document.getElementById('customer-landline').value = c.landline ?? '';
    document.getElementById('customer-notes').value = c.notes ?? '';
    openModal('modal-cliente');
}

function updateCustomerFields() {

    const type = document.getElementById('customer-type').value;

    const companyName = document.getElementById('customer-companyName');
    const vatNumber   = document.getElementById('customer-vatNumber');
    const taxCode     = document.getElementById('customer-taxCode');

    if (type === CUSTOMER_TYPES.COMPANY) {
        companyName.disabled = false;
        vatNumber.disabled = false;
        taxCode.disabled = false;
    } else if (type === CUSTOMER_TYPES.PUBLIC_ADMIN) {
        companyName.disabled = false;
        vatNumber.disabled = false;
        taxCode.disabled = false;
    } else if (type === CUSTOMER_TYPES.FREELANCER) {
        companyName.disabled = false;
        vatNumber.disabled = false;
        taxCode.disabled = false;
    } else if (type === CUSTOMER_TYPES.PRIVATE) {
        companyName.disabled = true;
        vatNumber.disabled = true;
        companyName.value = null;
        vatNumber.value = null;
        taxCode.disabled = false;
    }
}

async function saveCustomer() {
    const name = document.getElementById('customer-name').value.trim();
    if (!name) { showToast('Il nome è obbligatorio', 'warning'); return; }

    const surname = document.getElementById('customer-surname').value.trim();
    if (!surname) { showToast('Il cognome è obbligatorio', 'warning'); return; }

    const email = document.getElementById('customer-email').value.trim();
    if (!email) { showToast(`L'email è obbligatoria`, 'warning'); return; }

    const phone = document.getElementById('customer-phone').value.trim();
    if (!phone) { showToast('Il telefono è obbligatorio', 'warning'); return; }

    const vatNumber = document.getElementById('customer-vatNumber').value.trim() || null;
    const taxCode = document.getElementById('customer-taxCode').value.trim()  || null;
    const companyName = document.getElementById('customer-companyName').value.trim()  || null;
    const customerType = document.getElementById("customer-type").value.trim() || null;

    if (!customerType) {
        showToast(`Il tipo cliente è obbligatorio`, 'warning'); return;
    }

    if (customerType === CUSTOMER_TYPES.COMPANY || customerType === CUSTOMER_TYPES.PUBLIC_ADMIN || customerType === CUSTOMER_TYPES.FREELANCER) {
        if (!companyName) { showToast(`La ragione sociale è obbligatoria`, 'warning'); return; }
        if (!vatNumber) { showToast(`La P.IVA è obbligatoria`, 'warning'); return; }
        if (!taxCode) { showToast(`Il C.F. è obbligatorio`, 'warning'); return; }
    }
    
    if (customerType === CUSTOMER_TYPES.COMPANY) {
        if (vatNumber != taxCode) { showToast(`La P.IVA deve essere uguale al C.F.`, 'warning'); return; }
    } else if (customerType === CUSTOMER_TYPES.PUBLIC_ADMIN) {
        // TODO: check -> vatNumber != taxCode (taxCode must be numeric)
    } else if (customerType === CUSTOMER_TYPES.FREELANCER) {
        // TODO: check -> taxCode is a normal taxCode
    }

    const data = {
        name,
        surname,
        email,
        phone,
        region:   document.getElementById('customer-region').value.trim() || null,
        country:  document.getElementById('customer-country').value.trim() || null,
        city:     document.getElementById('customer-city').value.trim() || null,
        province: document.getElementById('customer-province').value.trim() || null,
        address:  document.getElementById('customer-address').value.trim() || null,
        vatNumber,
        companyName,
        taxCode,
        landline: document.getElementById('customer-landline').value.trim() || null,
        lat:      document.getElementById('customer-lat').value.trim() || null,
        lon:      document.getElementById('customer-lon').value.trim() || null,
        notes:    document.getElementById('customer-notes').value.trim() || null,
        customerType: { id: customerType },
    };

    console.log(data);

    const id = document.getElementById('customer-id').value;
    try {
        if (id) {
            await ClientiAPI.update(id, data);
            showToast('Cliente aggiornato', 'success');
        } else {
            const res = await ClientiAPI.create(data);
            console.log("CREATE RESPONSE:", res);
            showToast('Cliente aggiunto', 'success');
        }
        closeModal('modal-cliente');
        await loadClienti();
    } catch (e) {
        showToast(`Errore: ${e.message}`);
        console.log(`Errore: ${e.message}`, 'error');
    }
}

async function loadCustomeTypes() {
    const select = document.getElementById('customer-type');

    try {
        const types = await CustomerTypeAPI.getAll();

        select.innerHTML =
            `<option value="">Seleziona tipo cliente</option>` +
            types.map(t =>
                `<option value="${t.id}">${t.name}</option>`
            ).join('');
    } catch (e) {
        showToast(`Errore caricamento tipi cliente: ${e.message}`);
        console.log(`Errore caricamento tipi cliente: ${e.message}`, 'error');
    }
}

function chiediElimina(id, nome) {
    customerId = id;
    document.getElementById('elimina-name').textContent = nome;
    openModal('modal-elimina');
}

async function confermaElimina() {
    if (!customerId) return;
    try {
        await ClientiAPI.delete(customerId);
        showToast('Cliente eliminato', 'success');
        closeModal('modal-elimina');
        await loadClienti();
    } catch (e) {
        showToast(`Errore: ${e.message}`, 'error');
    }
    customerId = null;
}

function exportClienti() {
    if (!tuttiClienti.length) { showToast('Nessun dato da esportare', 'warning'); return; }
    const header = ['Nome','Cognome','TipoCliente','Azienda','Email','Telefono','Nazione','Regione','Provincia','Città','Indirizzo','PartitaIVA','CodiceFiscale','TelefonoFisso','Latitudine','Longitudine','DataInserimento','DataUltimaModifica'].join(',');
    const rows = tuttiClienti.map(c =>
        [c.name, c.surname, c.customerType.name, c.companyName, c.email, c.phone, c.country, c.region, c.province, c.city, c.address, c.vatNumber, c.taxCode, c.landline, c.lat, c.lon, c.insertDate, c.lastUpdateDate]
        .map(v => `"${v ?? ''}"`).join(','));
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `clienti_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('CSV esportato', 'success');
}

const CUSTOMER_TYPES = {
    COMPANY: "1",
    PUBLIC_ADMIN: "2",
    FREELANCER: "3",
    PRIVATE: "4",
};

</script>
</body>
</html>
